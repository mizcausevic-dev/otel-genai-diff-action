name: "OTel GenAI Diff"
description: "PR gate for OTel GenAI rollup changes — diffs HEAD vs base, posts a comment, fails on cost/token jumps."
author: "mizcausevic-dev"
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  report-path:
    description: "Path (relative to repo root) to the OTel GenAI rollup report JSON file (output of otel-genai-rollup)."
    required: true
  base-sha:
    description: "Override the base SHA used to retrieve the previous version. Defaults to pull_request.base.sha from the event payload."
    required: false
  threshold:
    description: "Minimum relative delta (0..1) to flag a token / span / cost change as a 'jump'. Default '0.10' (10%)."
    required: false
    default: "0.10"
  comment-on-pr:
    description: "Post the Markdown diff as a PR comment. 'auto' (default) posts only on pull_request events; 'true' / 'false' force the behavior."
    required: false
    default: "auto"
  fail-on-breaking:
    description: "Fail the run when the diff is classified as BREAKING (default 'true')."
    required: false
    default: "true"
  fail-on-any-change:
    description: "Fail the run when there is ANY diff at all (default 'false')."
    required: false
    default: "false"
  github-token:
    description: "Token used to post the PR comment (defaults to GITHUB_TOKEN)."
    required: false
    default: ${{ github.token }}

outputs:
  breaking:
    description: "True iff the diff is BREAKING."
  change-count:
    description: "Number of changes detected in the diff."
  new-report:
    description: "True iff the report path didn't exist at base SHA (newly added report)."
  cost-delta-usd:
    description: "Net change in total cost (next - previous) in USD."

runs:
  using: "node20"
  main: "dist/index.js"
